<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pergunta 😏</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      height: 100vh;
      overflow: hidden;
    }
    h1 {
      margin-top: 80px;
      color: #333;
      padding: 0 20px;
    }
    .container {
      position: relative;
      width: 100%;
      height: 60vh;
    }
    button {
      padding: 15px 25px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      position: absolute;
      transition: 0.2s;
    }
    #sim {
      background-color: #28a745;
      color: white;
      left: 30%;
      top: 50%;
    }
    #nao {
      background-color: #dc3545;
      color: white;
      left: 55%;
      top: 50%;
    }
    @media (max-width: 600px) {
      h1 {
        font-size: 22px;
      }
      button {
        font-size: 14px;
        padding: 12px 20px;
      }
    }
  </style>
</head>
<body>
  <h1>Você aceita? 😳</h1>
  <div class="container">
    <button id="sim" onclick="aceitou()">Sim</button>
    <button id="nao" ontouchstart="fugir()" onmouseover="fugir()">Não</button>
  </div>
  <script>
    function aceitou() {
      alert("Eu sabia!!! 😍");
      window.location.href = "pagina2.html";
    }
    function fugir() {
      let botao = document.getElementById("nao");
      let container = document.querySelector(".container");
      let largura = container.clientWidth - 80;
      let altura = container.clientHeight - 50;
      let x = Math.random() * largura;
      let y = Math.random() * altura;
      botao.style.left = x + "px";
      botao.style.top = y + "px";
    }
  </script>
</body>
</html>
